<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ABIZ POS Desktop</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    body { overflow: hidden; }
    .desktop-header {
      height: 52px;
      background: #060c1a;
      color: #e8f0fe;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 14px;
      gap: 12px;
      border-bottom: 1px solid #1e2d47;
    }
    .brand { font-weight: 800; letter-spacing: .2px; }
    .desktop-actions { display: flex; gap: 8px; align-items: center; }
    .desktop-actions input {
      width: 360px;
      margin: 0;
      padding: 8px 10px;
      font-size: 13px;
      background: #111827;
      color: #e8f0fe;
      border-color: #1e2d47;
    }
    .desktop-actions button,
    .desktop-actions a {
      padding: 8px 12px;
      border-radius: 6px;
      text-decoration: none;
      font-size: 13px;
    }
    iframe {
      width: 100vw;
      height: calc(100vh - 52px);
      border: 0;
      display: block;
      background: #0a0f1e;
    }
  </style>
</head>
<body>
  <header class="desktop-header">
    <div class="brand">ABIZ Global Services POS</div>
    <div class="desktop-actions">
      <input id="api-base" placeholder="https://your-railway-domain.up.railway.app/api/v1">
      <button id="save-api">Save Backend</button>
      <a class="link-button secondary" href="offline.html">Offline POS</a>
    </div>
  </header>
  <iframe id="web-dashboard" src="../frontend/index.html"></iframe>

  <script>
    const input = document.getElementById('api-base');
    const frame = document.getElementById('web-dashboard');
    input.value = localStorage.getItem('abiz_api_base') || '';

    function applyApiBase() {
      const value = input.value.trim();
      if (!value) return;
      localStorage.setItem('abiz_api_base', value);
      try {
        frame.contentWindow.localStorage.setItem('abiz_api_base', value);
        frame.contentWindow.location.reload();
      } catch {
        frame.src = frame.src;
      }
    }

    frame.addEventListener('load', () => {
      const value = localStorage.getItem('abiz_api_base');
      if (!value) return;
      try {
        frame.contentWindow.localStorage.setItem('abiz_api_base', value);
      } catch {}
    });

    document.getElementById('save-api').addEventListener('click', applyApiBase);
  </script>
</body>
</html>
