<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ABIZ POS Desktop</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="shell">
    <section class="topbar">
      <div>
        <h1>ABIZ POS Desktop</h1>
        <p id="status">Offline-ready sales terminal</p>
      </div>
      <div class="actions">
        <button id="sync-products">Sync Products</button>
        <button id="sync-sales">Sync Sales</button>
        <button id="settings-btn">Settings</button>
      </div>
    </section>

    <section class="grid">
      <div class="panel">
        <h2>Scanner</h2>
        <input id="scanner-input" autocomplete="off" placeholder="Scan QR/barcode with USB scanner">
        <p class="hint">USB scanner works like keyboard input. Keep this field focused and scan.</p>
        <div id="product-result" class="result"></div>
      </div>

      <div class="panel">
        <h2>Cart</h2>
        <div id="cart-list" class="cart"></div>
        <div class="totals">
          <span>Total</span>
          <strong id="total">0.00</strong>
        </div>
        <div class="row">
          <button id="clear-cart" class="secondary">Clear</button>
          <button id="checkout">Save Sale & Print</button>
        </div>
      </div>
    </section>

    <section class="panel">
      <h2>Local Products</h2>
      <div id="products-list" class="products"></div>
    </section>
  </main>

  <dialog id="settings-dialog">
    <form method="dialog">
      <h2>Server Settings</h2>
      <label>Backend URL</label>
      <input id="backend-url" placeholder="https://your-app.up.railway.app/api/v1">
      <label>JWT Token</label>
      <input id="auth-token" placeholder="Login token">
      <div class="row">
        <button value="cancel" class="secondary">Cancel</button>
        <button id="save-settings" value="default">Save</button>
      </div>
    </form>
  </dialog>

  <script src="renderer.js"></script>
</body>
</html>
